<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>扫码拨号</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .call-btn {
      font-size: 1.8rem;
      text-decoration: none;
      color: white;
      background-color: #007bff;
      padding: 1.2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
      transition: background-color 0.3s;
    }
    .call-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <a id="callBtn" class="call-btn" href="javascript:void(0);">📞 扫码/点击拨号</a>

  <script>
    document.getElementById("callBtn").addEventListener("click", function(e) {
      e.preventDefault();
      const mixStr = "NDU5Mzk5MzM5ODE=|reverse|10"; 
      const decodePhone = (str) => {
        const [base64Str, method, radix] = str.split("|");
        let phone = atob(base64Str);
        if (method === "reverse") {
          phone = phone.split("").reverse().join("");
        }
        if (radix) {
          phone = phone.split("").map(c => parseInt(c, radix)).join("");
        }
        return phone;
      };
      const phoneNum = decodePhone(mixStr);
      window.location.href = "tel:" + phoneNum;
    });
    document.getElementById("callBtn").addEventListener("contextmenu", (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
